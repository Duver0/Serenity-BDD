# ─── serenity.conf ────────────────────────────────────────────────────────────
serenity {
    project.name    = "Serenity BDD – OpenCart Example"
    project.version = "1.0"
    take.screenshots = AFTER_EACH_STEP

    # parallel {
    #     threads = 4
    # }

    # reports.show.step.details = true
    # report.encoding = "UTF-8"

    # restart.browser.for.each = scenario
}

# ─── WebDriver settings ───────────────────────────────────────────────────────
webdriver {
    driver = chrome
    chrome.switches = "--headless=new,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080"
    # base.url = "https://opencart-demo.com"
}

# ─── Timeouts ────────────────────────────────────────────────────────────────
timeouts {
    implicit.wait    = 5
    default.wait.for = 10
}


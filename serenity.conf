# ─── serenity.conf ────────────────────────────────────────────────────────────
# Serenity BDD configuration file (HOCON format).
# Place this file at the project root (same level as build.gradle).
# Full reference: https://serenity-bdd.github.io/docs/reference/serenity-properties

serenity {
    # ── Project metadata shown in the HTML report ───────────────────────────
    project.name    = "Serenity BDD – Google Search Example"
    project.version = "1.0"

    # ── Take a screenshot on every Selenium action (AFTER_EACH_STEP) ────────
    # Options: FOR_FAILURES | AFTER_EACH_STEP | BEFORE_AND_AFTER_EACH_STEP
    take.screenshots = AFTER_EACH_STEP

    # ── "Living Documentation" / report output directory ────────────────────
    # Default output: build/site/serenity (set by the Serenity Gradle plugin)
    # Uncomment and change the path below only if you need a custom location:
    # outputDirectory = "build/site/serenity"
}

# ─── WebDriver settings ───────────────────────────────────────────────────────
webdriver {
    driver = chrome

    # Run Chrome in headless mode (no visible browser window).
    # Remove or set to false if you want to watch the browser.
    chrome.switches = "--headless=new,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080"
}

# ─── Timeouts ────────────────────────────────────────────────────────────────
timeouts {
    implicit.wait    = 5     # seconds
    default.wait.for = 10    # seconds (for Serenity waits)
}
